# harmostes release pipeline — GitVersion + GoReleaser + OCI Helm chart.
#
# Pattern: push to main → GitVersion computes semver from conventional commits →
# creates tag → GoReleaser builds 4 Go binaries, 3 Docker images, archives +
# SBOM + cosign-signed checksums → publishes OCI Helm chart → GitHub Release.
#
# The OCI chart is consumed by Flux's HelmRepository(type:oci) in k8s-config,
# which auto-upgrades the HelmRelease on every new chart version. The chart's
# image defaults are baked to match the release (chart X.Y.Z carries images
# X.Y.Z), so chart + images always advance atomically.
#
# Adapted from rezuscloud/rezuscloud and rezuscloud/platform-website.
# Key difference: packages are user-owned (tibrezus/*), so GITHUB_TOKEN can't
# push to GHCR — HARMOSTES_GITHUB_TOKEN (PAT) is used for Docker login + chart push.
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      snapshot:
        description: Run in snapshot mode (no publish)
        type: boolean
        default: false

permissions:
  contents: write  # create tags + GitHub Release
  packages: write  # push images + OCI chart to ghcr

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  version:
    name: Determine Version
    if: github.event.inputs.snapshot != 'true'
    runs-on: ubuntu-latest
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
      sha: ${{ steps.gitversion.outputs.sha }}
      tagExists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel 9.0 --install-dir "$HOME/.dotnet"
          echo "$HOME/.dotnet" >> "$GITHUB_PATH"

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: '6.7.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0
        with:
          configFilePath: .github/GitVersion.yml
          disableShallowCloneCheck: true

      - name: Display Version
        run: |
          echo "SemVer: ${{ steps.gitversion.outputs.semVer }}"
          echo "MajorMinorPatch: ${{ steps.gitversion.outputs.majorMinorPatch }}"

      - name: Check if tag exists
        id: check_tag
        run: |
          TAG="v${{ steps.gitversion.outputs.semVer }}"
          if git tag -l "$TAG" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG does not exist, will create"
          fi

      - name: Create git tag
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `v${{ steps.gitversion.outputs.semVer }}`;
            const sha = '${{ steps.gitversion.outputs.sha }}';
            console.log(`Creating tag ${tag} at ${sha}`);
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: sha
            });

  release:
    name: Release
    needs: version
    if: github.event.inputs.snapshot != 'true' && needs.version.outputs.tagExists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: v${{ needs.version.outputs.semVer }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          # Packages are user-owned (tibrezus/*) — GITHUB_TOKEN can't push.
          # Use the platform PAT (write:packages) sourced from BSM.
          username: x-access-token
          password: ${{ secrets.HARMOSTES_GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          install-only: true

      - name: Install gettext-base
        run: which envsubst || (sudo apt-get update -q && sudo apt-get install -y gettext-base)

      - uses: sigstore/cosign-installer@v4.1.1

      - uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean --config .github/goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HARMOSTES_GITHUB_TOKEN: ${{ secrets.HARMOSTES_GITHUB_TOKEN }}

      # Publish the OCI Helm chart after images are built. The chart embeds
      # the image versions, making chart + images an atomic release unit.
      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up yq
        uses: mikefarah/yq@v4

      - name: Publish OCI Helm chart
        env:
          CHART_VERSION: ${{ needs.version.outputs.semVer }}
          HARMOSTES_GITHUB_TOKEN: ${{ secrets.HARMOSTES_GITHUB_TOKEN }}
        run: bash .github/scripts/publish-chart.sh

      - name: Attach chart to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.semVer }}
          files: harmostes-*.tgz

  snapshot:
    name: Snapshot Build
    if: github.event.inputs.snapshot == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel 9.0 --install-dir "$HOME/.dotnet"
          echo "$HOME/.dotnet" >> "$GITHUB_PATH"

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: '6.7.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0
        with:
          configFilePath: .github/GitVersion.yml
          disableShallowCloneCheck: true

      - name: Display Version
        run: |
          echo "SemVer: ${{ steps.gitversion.outputs.semVer }}"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: x-access-token
          password: ${{ secrets.HARMOSTES_GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          install-only: true

      - name: Install gettext-base
        run: which envsubst || (sudo apt-get update -q && sudo apt-get install -y gettext-base)

      - uses: sigstore/cosign-installer@v4.1.1

      - uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser (snapshot)
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --snapshot --clean --config .github/goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HARMOSTES_GITHUB_TOKEN: ${{ secrets.HARMOSTES_GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: v${{ steps.gitversion.outputs.semVer }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up yq
        uses: mikefarah/yq@v4

      - name: Publish OCI Helm chart (snapshot)
        env:
          CHART_VERSION: ${{ steps.gitversion.outputs.semVer }}
          HARMOSTES_GITHUB_TOKEN: ${{ secrets.HARMOSTES_GITHUB_TOKEN }}
        run: bash .github/scripts/publish-chart.sh
