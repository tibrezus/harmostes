# Keep Go modules and GitHub Actions current. Dependabot opens version-bump PRs
# (weekly) which pass through CI (.github/workflows/ci.yml) and the normal
# dev-workflow gate chain before merging.
version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(ci)
      include: scope
