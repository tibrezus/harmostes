# harmostes release pipeline — atomic images + OCI Helm chart, driven by a git
# tag. This is the fix for "chart and image drift": a single tag vX.Y.Z builds
# the controller + worker images AND publishes an OCI chart whose image defaults
# point at that same version, so Flux can deploy a release where the chart and
# its images always match (never the chart outrunning the image, as in #4).
#
# Release flow: `git tag v0.7.0 && git push origin v0.7.0`.
#   → build+push ghcr.io/tibrezus/harmostes-{controller,worker}:0.7.0
#   → publish OCI chart oci://ghcr.io/tibrezus/harmostes:0.7.0
#   → GitHub Release with auto-generated notes
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch: {} # manual trigger for validation without re-tagging

permissions:
  contents: write  # create the GitHub Release
  packages: write  # push images + OCI chart to ghcr

jobs:
  images:
    name: build & push image (${{ matrix.target }}, amd64)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: controller
            dockerfile: Dockerfile.controller
            image: ghcr.io/tibrezus/harmostes-controller
          - target: worker
            dockerfile: Dockerfile.worker
            image: ghcr.io/tibrezus/harmostes-worker
    steps:
      - name: Checkout (with .agents submodule for worker skills)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Derive version (strip leading v)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # The ghcr packages are user-owned + unlinked to the repo, so the
          # GITHUB_TOKEN can't push (403). Use the platform GitHub PAT
          # (write:packages) sourced from BSM, mirrored into this Actions secret.
          username: x-access-token
          password: ${{ secrets.HARMOSTES_GITHUB_TOKEN }}

      # amd64-only: the worker Dockerfile hardcodes zig-linux-x86_64, and the
      # cluster's only arm64 node is a tainted control-plane (no workloads land
      # there). Revisit when an arm64 workload pool exists.
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ matrix.image }}:${{ steps.ver.outputs.version }}
            ${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  chart:
    name: publish OCI chart
    needs: images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version (strip leading v)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up yq
        uses: mikefarah/yq@v4

      # Bake the release version into the chart so the published artifact is
      # self-contained: chart version == appVersion == image tags. These edits
      # are in the ephemeral checkout; they are NOT committed to main (main is
      # the dev source; the OCI artifact is the release).
      - name: Align chart version + image refs to the release tag
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          yq -i '.version = strenv(V)' chart/Chart.yaml
          yq -i '.appVersion = strenv(V)' chart/Chart.yaml
          yq -i '.image.controller = "ghcr.io/tibrezus/harmostes-controller:" + strenv(V)' chart/values.yaml
          yq -i '.image.worker = "ghcr.io/tibrezus/harmostes-worker:" + strenv(V)' chart/values.yaml
          echo "--- Chart.yaml (version/appVersion) ---"
          yq '.version, .appVersion' chart/Chart.yaml
          echo "--- values.yaml (image) ---"
          yq '.image' chart/values.yaml

      - name: Login to ghcr
        run: echo "${{ secrets.HARMOSTES_GITHUB_TOKEN }}" | helm registry login ghcr.io -u x-access-token --password-stdin

      - name: Package + push OCI chart
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          helm package chart/ --dependency-update
          helm push "harmostes-${V}.tgz" oci://ghcr.io/tibrezus

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: harmostes-*.tgz
