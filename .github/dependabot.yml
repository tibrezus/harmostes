# Keep Go modules and GitHub Actions current. Dependabot opens version-bump PRs
# (weekly) which pass through CI (.github/workflows/ci.yml) and the normal
# dev-workflow gate chain before merging.
version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      # k8s.io/* + controller-runtime are tightly version-coupled — a single-
      # library bump breaks the build (closed #17: apimachinery alone pulled
      # structured-merge-diff/v6 while client-go stayed on /v4). Group them so
      # they bump and CI-test as one unit.
      kubernetes:
        patterns: ["k8s.io/*", "sigs.k8s.io/controller-runtime"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(ci)
      include: scope
