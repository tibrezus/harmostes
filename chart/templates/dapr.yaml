# Dapr components — the deterministic event-system application layer. State for
# skip/dedup, pub/sub for choreography + observability. Reuse the cluster Valkey
# with an isolated DB (default 3) so harmostes never crosses llm-wiki (0/1) or
# fork-maintenance (2). Swap backends by changing these Component CRs only.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: {{ .Values.dapr.stateStore }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: harmostes
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: {{ .Values.dapr.valkeyHost }}
    - name: redisDB
      value: {{ quote .Values.dapr.valkeyDB }}
---
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: {{ .Values.dapr.pubSub }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: harmostes
spec:
  type: pubsub.redis
  version: v1
  metadata:
    - name: redisHost
      value: {{ .Values.dapr.valkeyHost }}
    - name: redisDB
      value: {{ quote .Values.dapr.valkeyDB }}
    # Per-namespace consumer isolation
    - name: consumerID
      value: harmostes
---
# Dapr Configuration referenced by worker pods via dapr.io/config. The sentry
# rejects a daprd whose referenced config does not exist, so this MUST be present
# before enabling sidecar injection. Mirrors llm-wiki-config.
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: harmostes-config
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: harmostes
spec:
  features:
    - name: proxy.grpc
      enabled: true
    {{- if .Values.observability.enabled }}
    # The fork daprd is v1.18+ but the Dapr control plane is v1.17.7; without
    # HotReload disabled the sidecar floods the operator with missing-RPC retries.
    - name: HotReload
      enabled: false
    {{- end }}
  metric:
    enabled: true
  metrics:
    enabled: true
  {{- if .Values.observability.enabled }}
  # rezuscloud/dapr fork: unified OTLP block pushes traces+metrics+logs (precedence
  # 2). The Prometheus :9090 endpoint above still runs as a supplementary scrape.
  observability:
    otel:
      endpointAddress: {{ .Values.observability.otlpEndpoint | quote }}
      protocol: grpc
      isSecure: {{ not .Values.observability.otlpInsecure }}
      timeout: "30s"
  tracing:
    samplingRate: {{ .Values.observability.samplingRate | quote }}
  {{- else }}
  tracing:
    samplingRate: "0"
  {{- end }}
