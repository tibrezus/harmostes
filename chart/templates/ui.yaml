{{- if .Values.ui.enabled }}
# harmostes-ui: self-service web interface for managing Workflow CRs.
# Authenticated via Authentik forward-auth (identity injected as headers).
# The Go server reads X-Forwarded-Preferred-Username and filters all queries
# by the harmostes.dev/owner label.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: harmostes-ui
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: harmostes
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: harmostes
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: harmostes
        app.kubernetes.io/component: ui
      annotations:
        # Dapr sidecar for pub/sub subscription (G7 live execution).
        # The sidecar subscribes to harmostes-events topic and delivers
        # lifecycle events to the UI's /dapr/events endpoint.
        dapr.io/enabled: "true"
        dapr.io/app-id: harmostes-ui
        dapr.io/app-port: "8083"
        dapr.io/config: harmostes-config
        {{- if .Values.observability.daprdImage }}
        dapr.io/sidecar-image: {{ .Values.observability.daprdImage | quote }}
        {{- end }}
        {{- if .Values.observability.otlpInsecure }}
        dapr.io/env: "OTEL_EXPORTER_OTLP_INSECURE=true"
        {{- end }}
    spec:
      serviceAccountName: {{ .Values.ui.serviceAccount }}
      {{- if .Values.image.pullSecret }}
      imagePullSecrets:
        - name: {{ .Values.image.pullSecret }}
      {{- end }}
      containers:
        - name: ui
          image: {{ .Values.ui.image }}
          imagePullPolicy: Always
          args:
            - --namespace={{ .Values.namespace }}
            {{- if .Values.ui.rbac }}
            - --rbac-policy=/etc/harmostes-rbac/policy.json
            {{- end }}
          env:
            - name: HARMOSTES_NAMESPACE
              value: {{ .Values.namespace }}
          ports:
            - name: http
              containerPort: 8083
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8083
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          {{- if .Values.ui.rbac }}
          volumeMounts:
            - name: rbac-policy
              mountPath: /etc/harmostes-rbac
              readOnly: true
          {{- end }}
      {{- if .Values.ui.rbac }}
      volumes:
        - name: rbac-policy
          configMap:
            name: harmostes-ui-rbac
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: harmostes-ui
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: harmostes
    app.kubernetes.io/component: ui
spec:
  selector:
    app.kubernetes.io/name: harmostes
    app.kubernetes.io/component: ui
  ports:
    - name: http
      port: 8083
      targetPort: 8083
      protocol: TCP
{{- end }}
