# Service exposing the controller's webhook + metrics ports.
#   - webhook (8082): receives git push events from GitHub/GitLab/Forgejo
#     (routed via Gateway API HTTPRoute or an Ingress for TLS termination)
#   - metrics (8080): controller-runtime /metrics (Prometheus scrape)
apiVersion: v1
kind: Service
metadata:
  name: harmostes-controller
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: harmostes
    app.kubernetes.io/component: controller
spec:
  selector:
    app.kubernetes.io/name: harmostes
    app.kubernetes.io/component: controller
  ports:
    - name: webhook
      port: 8082
      targetPort: 8082
      protocol: TCP
    - name: metrics
      port: 8080
      targetPort: 8080
      protocol: TCP
