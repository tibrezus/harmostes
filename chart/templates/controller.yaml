# The monitor controller: always-on, watches Workflow CRs, schedules worker Jobs.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: harmostes-controller
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: harmostes
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: harmostes
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: harmostes
        app.kubernetes.io/component: controller
      {{- if .Values.observability.controllerSidecar }}
      annotations:
        dapr.io/enabled: "true"
        dapr.io/subscribe: "git.push:*"
        dapr.io/app-id: harmostes-controller
        dapr.io/config: harmostes-config
        {{- if .Values.observability.daprdImage }}
        dapr.io/sidecar-image: {{ .Values.observability.daprdImage | quote }}
        {{- end }}
        {{- if .Values.observability.otlpInsecure }}
        dapr.io/env: "OTEL_EXPORTER_OTLP_INSECURE=true"
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ .Values.controller.serviceAccount }}
      {{- if .Values.image.pullSecret }}
      imagePullSecrets:
        - name: {{ .Values.image.pullSecret }}
      {{- end }}
      containers:
        - name: controller
          image: {{ .Values.image.controller }}
          imagePullPolicy: Always
          args:
            - --namespace={{ .Values.namespace }}
            - --dapr-enabled={{ .Values.dapr.injectWorker }}
            {{- if .Values.observability.enabled }}
            - --daprd-image={{ .Values.observability.daprdImage }}
            - --otlp-endpoint={{ .Values.observability.otlpEndpoint }}
            - --otlp-insecure={{ .Values.observability.otlpInsecure }}
            {{- end }}
            - --worker-image={{ .Values.image.worker }}
            - --skills-repo={{ .Values.skills.repo }}
            - --service-account={{ .Values.controller.serviceAccount }}
            - --poll-interval={{ .Values.controller.pollInterval }}
            {{- if .Values.image.pullSecret }}
            - --worker-image-pull-secret={{ .Values.image.pullSecret }}
            {{- end }}
          env:
            - name: HARMOSTES_WORKER_IMAGE
              value: {{ .Values.image.worker }}
            {{- if .Values.observability.enabled }}
            # Controller's own OTel SDK: exports its reconcile/create-worker spans +
            # metrics (Phase 4). Without these, observability.Init is a no-op.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otlpEndpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: {{ .Values.observability.otlpInsecure | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- end }}
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
