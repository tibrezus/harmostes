# harmostes framework chart — install once per cluster. Workflows are applied as
# Workflow CRs (see examples/).
namespace: harmostes

image:
  controller: ghcr.io/tibrezus/harmostes-controller:0.6.0   # Phase 0: requires --daprd-image/--otlp-insecure flags (≥0.6.0)
  worker: ghcr.io/tibrezus/harmostes-worker:0.4.2
  pullSecret: ghcr-pull   # set to "" to disable

skills:
  repo: https://github.com/tibrezus/agents.git   # cloned by init container into /skills on every worker pod

controller:
  serviceAccount: harmostes-controller
  pollInterval: 5m        # default run cadence for Workflows without a schedule
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 1, memory: 512Mi }

dapr:
  # Dapr is the deterministic event-system application layer. Reuse the cluster's
  # Valkey with an isolated DB so harmostes never crosses llm-wiki (DB 0/1) or
  # fork-maintenance (DB 2).
  stateStore: statestore
  pubSub: pubsub
  valkeyHost: valkey.llm-wiki.svc.cluster.local:6379
  valkeyDB: "3"
  injectWorker: true    # Dapr sidecar injected into worker Jobs (events/state + clean shutdown)

# Observability via the rezuscloud/dapr fork: push traces+metrics+logs over OTLP
# to SigNoz through a unified spec.observability.otel block, deployed per-pod via
# dapr.io/sidecar-image. See llm-wiki: concepts/harmostes-observability.md and
# guides/otlp-observability-deployment.md. Disable to fall back to stock daprd
# (tracing off, Prometheus scrape only).
observability:
  enabled: true
  daprdImage: ghcr.io/rezuscloud/daprd:otel-metrics-latest-amd64   # arm64 edge nodes: ...-arm64. Digest-pin (@sha256:) for IfNotPresent re-pull.
  otlpEndpoint: signoz-otel-collector.signoz.svc.cluster.local:4317 # SigNoz OTLP collector (signoz namespace)
  otlpInsecure: true   # GetIsSecure() defaults to TLS; cluster-internal collector uses plain gRPC
  samplingRate: "0.5"  # Dapr tracing sample fraction (traces are rare; bump for debugging)
  # Opt the controller Deployment into the forked daprd sidecar (decision #5).
  # The controller app does not itself use Dapr building blocks: webhook triggers
  # arrive via direct HTTP (:8082), and the controller's own telemetry goes through
  # its OTel SDK, not daprd. Workers carry the daprd sidecar for pub/sub + tracing.
  # Keep off by default; flip to true only if the controller needs daprd runtime metrics.
  controllerSidecar: false
